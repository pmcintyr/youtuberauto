name: YouTube Automation Pipeline

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Debug mode'
        type: boolean
        default: false
      video_id:
        description: 'Specific video ID to process (optional)'
        type: string
        required: false

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevents hanging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # Stable version
      
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade yt-dlp
      
      - name: Create necessary directories
        run: |
          mkdir -p downloads outputs data logs
      
      - name: Run main pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          UPLOAD_PRIVACY: ${{ secrets.UPLOAD_PRIVACY || 'public' }}
          VIDEO_DURATION_LIMIT: ${{ secrets.VIDEO_DURATION_LIMIT || '60' }}
        run: |
          python src/main.py
      
      - name: Upload processed data as artifact
        if: always()  # Upload even if pipeline fails
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-results-${{ github.run_id }}
          path: |
            data/processed.json
            logs/
            outputs/
          retention-days: 14
          if-no-files-found: warn
          compression-level: 6  # Optional: balance between speed and size
      
      - name: Clean up downloads
        if: always()  # Clean up even if pipeline fails
        run: |
          rm -rf downloads/*
          rm -rf outputs/*
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed! Check the logs for details."
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
