name: YouTube Automation Pipeline

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade yt-dlp
      
      - name: Create necessary directories
        run: |
          mkdir -p downloads outputs data logs
      
      - name: Run main pipeline
        env:
          # All environment variables from your .env file
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TARGET_CHANNEL_ID: ${{ secrets.TARGET_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-1.5-flash' }}
          UPLOAD_PRIVACY: ${{ secrets.UPLOAD_PRIVACY || 'public' }}
          VIDEO_DURATION_LIMIT: ${{ secrets.VIDEO_DURATION_LIMIT || '60' }}
        run: |
          python src/main.py
      
      - name: Upload processed data as artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pipeline-results
          path: |
            data/processed.json
            logs/
            outputs/
      
      - name: Clean up downloads
        run: |
          rm -rf downloads/*
          rm -rf outputs/*
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "❌ Pipeline failed! Check the logs for details."
          echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
